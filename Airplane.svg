<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500" fill="none">
  <title>Paper airplane following dotted line</title>
  <rect width="500" height="500" fill="white"/>

  <!-- dotted flight path -->
  <path d="M 48 430
           C 105 398, 144 342, 158 296
           C 180 225, 184 154, 142 120
           C 108 94, 78 116, 80 158
           C 82 214, 139 232, 136 196
           C 132 149, 86 127, 48 151
           C 10 175, 22 243, 78 277
           C 150 321, 253 318, 316 292"
        stroke="#251f22"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-dasharray="3 12"/>

  <!-- paper airplane placed at the end of the dotted line -->
  <g transform="translate(292 85) rotate(-10) scale(0.78)" stroke="#251f22" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 96 L 250 20 L 150 236 L 106 157 Z"/>
    <path d="M 0 96 L 106 157"/>
    <path d="M 106 157 L 250 20"/>
    <path d="M 106 157 L 115 236 L 150 236"/>
    <path d="M 115 236 L 166 184"/>
  </g>
</svg>
